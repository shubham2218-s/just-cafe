<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register — Just Cafe</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">
            <div class="logo-icon">☕</div>
            <h2>Join Just Cafe</h2>
            <p>Create your free account today</p>
        </div>

        <div id="alertBox"></div>

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="name" class="form-control" placeholder="Your full name" autofocus>
        </div>
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" class="form-control" placeholder="you@college.edu">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" class="form-control" placeholder="Min. 6 characters">
        </div>
        <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" id="confirm" class="form-control" placeholder="Repeat your password">
        </div>

        <button class="btn btn-primary btn-full" id="regBtn" onclick="doRegister()">Create Account</button>

        <p style="text-align:center;margin-top:1.5rem;font-size:0.9rem;color:var(--text-light);">
            Already have an account? <a href="/login" style="color:var(--primary);font-weight:700;">Sign in</a>
        </p>
    </div>
</div>

<script src="/js/main.js"></script>
<script>
getAuthStatus().then(auth => {
    if (auth.loggedIn) window.location.href = '/menu';
});

document.addEventListener('keydown', e => { if (e.key === 'Enter') doRegister(); });

async function doRegister() {
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm').value;
    const alertBox = document.getElementById('alertBox');
    const btn = document.getElementById('regBtn');

    alertBox.innerHTML = '';

    if (!name || !email || !password || !confirm) {
        alertBox.innerHTML = '<div class="alert alert-error">Please fill in all fields.</div>';
        return;
    }
    if (password.length < 6) {
        alertBox.innerHTML = '<div class="alert alert-error">Password must be at least 6 characters.</div>';
        return;
    }
    if (password !== confirm) {
        alertBox.innerHTML = '<div class="alert alert-error">Passwords do not match.</div>';
        return;
    }

    btn.textContent = 'Creating account...';
    btn.disabled = true;

    try {
        const res = await fetch('/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, email, password })
        });
        const data = await res.json();

        if (res.ok && data.success) {
            showToast('Account created! Welcome to Just Cafe ☕', 'success');
            setTimeout(() => window.location.href = '/menu', 700);
        } else {
            alertBox.innerHTML = `<div class="alert alert-error">${data.error || 'Registration failed.'}</div>`;
            btn.textContent = 'Create Account';
            btn.disabled = false;
        }
    } catch (e) {
        alertBox.innerHTML = '<div class="alert alert-error">Network error. Please try again.</div>';
        btn.textContent = 'Create Account';
        btn.disabled = false;
    }
}
</script>
</body>
</html>
