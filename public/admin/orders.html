<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Orders — Just Cafe Admin</title>
<link rel="stylesheet" href="/css/style.css">
<style>
    body { background: var(--bg); }
    .admin-layout { display:flex;min-height:calc(100vh - 64px); }
    .admin-sidebar { width:240px;background:var(--bg-dark);padding:1.5rem 1rem;flex-shrink:0;display:flex;flex-direction:column;gap:.25rem; }
    .sidebar-label { font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#6B5040;padding:.5rem 1rem .25rem;margin-top:.5rem; }
    .admin-sidebar a { display:flex;align-items:center;gap:.7rem;color:#C8B4A4;text-decoration:none;padding:.7rem 1rem;border-radius:10px;font-size:.88rem;font-weight:500;transition:all .2s; }
    .admin-sidebar a:hover { background:rgba(212,160,84,.15);color:#fff; }
    .admin-sidebar a.active { background:rgba(212,160,84,.25);color:var(--accent); }
    .admin-main { flex:1;padding:2rem;overflow:auto; }

    .filter-bar { display:flex;gap:.75rem;flex-wrap:wrap;margin-bottom:1.5rem;align-items:center; }
    .status-filter-btn { padding:.45rem 1.1rem;border:2px solid var(--border);background:#fff;border-radius:25px;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .2s;color:var(--text-light); }
    .status-filter-btn:hover,.status-filter-btn.active { background:var(--primary);border-color:var(--primary);color:#fff; }

    .orders-table-wrap { background:#fff;border-radius:16px;border:1px solid var(--border);overflow:hidden; }
    .order-tr { transition:background .15s; }
    .order-tr:hover td { background:rgba(253,246,238,.7); }

    .status-select { padding:5px 10px;border-radius:8px;border:1px solid var(--border);font-size:.8rem;font-weight:600;cursor:pointer;background:var(--bg);transition:border-color .2s; }
    .status-select:focus { outline:none;border-color:var(--primary); }

    /* Visual feedback when updating */
    .status-select.saving { opacity:.5;pointer-events:none; }
    .status-select.saved  { border-color:var(--success)!important; }
    .status-select.error  { border-color:var(--danger)!important; }

    .refresh-btn { margin-left:auto;background:none;border:2px solid var(--border);border-radius:10px;padding:.45rem 1rem;font-size:.82rem;font-weight:600;color:var(--text-light);cursor:pointer;transition:all .2s; }
    .refresh-btn:hover { background:var(--primary);border-color:var(--primary);color:#fff; }

    .no-orders { text-align:center;padding:4rem 2rem;color:var(--text-muted); }
    .no-orders .icon { font-size:3rem;margin-bottom:1rem; }

    .auto-refresh-bar { display:flex;align-items:center;gap:.75rem;font-size:.78rem;color:var(--text-muted);margin-bottom:1rem; }
    .pulse { width:8px;height:8px;border-radius:50%;background:var(--success);animation:pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }
</style>
</head>
<body>

<nav class="navbar">
    <a href="/" class="navbar-brand">☕ <span>Just</span>Cafe</a>
    <ul class="nav-links" id="navUserSection"></ul>
</nav>

<div class="admin-layout">
    <aside class="admin-sidebar">
        <div style="padding:.5rem 1rem 1.2rem;border-bottom:1px solid #3A2416;margin-bottom:.5rem;">
            <div style="font-size:.8rem;color:var(--text-muted);font-weight:600;">ADMIN PANEL</div>
            <div style="font-size:1rem;color:var(--accent);font-weight:800;margin-top:2px;">Just Cafe</div>
        </div>
        <div class="sidebar-label">Main</div>
        <a href="/admin/dashboard">📊 Dashboard</a>
        <a href="/admin/orders" class="active">📋 Manage Orders</a>
        <div class="sidebar-label">Catalogue</div>
        <a href="/admin/menu-management">🍽️ Menu Items</a>
        <div class="sidebar-label">Store</div>
        <a href="/menu" target="_blank">👁️ View Menu</a>
        <a href="/">🏠 Go to Site</a>
        <a href="#" onclick="logout()" style="color:#E07070;">🚪 Logout</a>
    </aside>

    <main class="admin-main">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.25rem;">
            <h1 style="font-size:1.6rem;font-weight:900;color:var(--primary-dark);">Manage Orders</h1>
            <button class="refresh-btn" id="refreshBtn" onclick="manualRefresh()">🔄 Refresh</button>
        </div>

        <div class="auto-refresh-bar">
            <span class="pulse"></span>
            <span id="lastRefreshed">Loading...</span>
            <span>· Auto-refreshes every 20s</span>
        </div>

        <!-- STATUS FILTERS -->
        <div class="filter-bar">
            <button class="status-filter-btn active" onclick="setFilter('all', this)">All Orders</button>
            <button class="status-filter-btn" onclick="setFilter('pending', this)">🟠 Pending</button>
            <button class="status-filter-btn" onclick="setFilter('preparing', this)">🔵 Preparing</button>
            <button class="status-filter-btn" onclick="setFilter('ready', this)">🟢 Ready</button>
            <button class="status-filter-btn" onclick="setFilter('delivered', this)">🟣 Delivered</button>
        </div>

        <p style="color:var(--text-muted);font-size:.88rem;margin-bottom:1rem;" id="orderCount"></p>

        <div class="orders-table-wrap">
            <div id="ordersTable">
                <div class="no-orders"><div class="icon">⏳</div><p>Loading orders...</p></div>
            </div>
        </div>
    </main>
</div>

<script src="/js/main.js"></script>
<script>
let allOrders     = [];
let currentFilter = 'all';
let autoTimer     = null;

async function checkAdmin() {
    const auth = await getAuthStatus();
    if (!auth.loggedIn || auth.role !== 'admin') window.location.href = '/login';
}

async function loadOrders() {
    try {
        const res = await fetch('/api/admin/orders');
        if (!res.ok) throw new Error('Server error ' + res.status);
        allOrders = await res.json();
        renderOrders();
        document.getElementById('lastRefreshed').textContent =
            'Last refreshed: ' + new Date().toLocaleTimeString('en-IN');
    } catch (e) {
        showToast('Failed to load orders: ' + e.message, 'error');
    }
}

function manualRefresh() {
    const btn = document.getElementById('refreshBtn');
    btn.textContent = '⏳ Refreshing...';
    loadOrders().then(() => { btn.textContent = '🔄 Refresh'; });
}

function setFilter(status, btn) {
    currentFilter = status;
    document.querySelectorAll('.status-filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderOrders();
}

function renderOrders() {
    const filtered = currentFilter === 'all'
        ? allOrders
        : allOrders.filter(o => o.status === currentFilter);

    document.getElementById('orderCount').textContent =
        `Showing ${filtered.length} order${filtered.length !== 1 ? 's' : ''}`;

    const container = document.getElementById('ordersTable');

    if (!filtered.length) {
        container.innerHTML = `<div class="no-orders"><div class="icon">📭</div><p>No ${currentFilter === 'all' ? '' : currentFilter + ' '}orders found</p></div>`;
        return;
    }

    // Build table — use data-orderid attribute so no ObjectId is injected into onclick
    container.innerHTML = `
        <table>
            <thead>
                <tr>
                    <th>Order ID</th>
                    <th>Student</th>
                    <th>Items</th>
                    <th>Total</th>
                    <th>Placed At</th>
                    <th>Status</th>
                    <th>Update Status</th>
                </tr>
            </thead>
            <tbody>
                ${filtered.map(order => {
                    const oid = String(order._id || order.id);
                    return `
                    <tr class="order-tr" data-orderid="${oid}">
                        <td><strong style="color:var(--primary)">#${oid.slice(-6).toUpperCase()}</strong></td>
                        <td>
                            <div style="font-weight:600;font-size:.88rem;">${order.user_name || 'Student'}</div>
                            <div style="font-size:.75rem;color:var(--text-muted);">${order.email || ''}</div>
                        </td>
                        <td style="max-width:200px;">
                            <div style="font-size:.82rem;color:var(--text-light);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
                                ${order.items_summary || '—'}
                            </div>
                        </td>
                        <td><strong>${fmt(order.total_price)}</strong></td>
                        <td style="font-size:.8rem;color:var(--text-muted);">${fmtDate(order.order_time || order.createdAt)}</td>
                        <td><span class="status-badge ${getStatusClass(order.status)}">${order.status}</span></td>
                        <td>
                            <select class="status-select" data-orderid="${oid}">
                                <option value="pending"   ${order.status==='pending'   ?'selected':''}>🟠 Pending</option>
                                <option value="preparing" ${order.status==='preparing' ?'selected':''}>🔵 Preparing</option>
                                <option value="ready"     ${order.status==='ready'     ?'selected':''}>🟢 Ready</option>
                                <option value="delivered" ${order.status==='delivered' ?'selected':''}>🟣 Delivered</option>
                            </select>
                        </td>
                    </tr>`;
                }).join('')}
            </tbody>
        </table>`;

    // Single event listener on the table — handles ALL select changes
    container.querySelector('table').addEventListener('change', handleStatusChange);
}

async function handleStatusChange(e) {
    const select = e.target.closest('select[data-orderid]');
    if (!select) return;

    const orderId   = select.dataset.orderid;   // always a string, read from data attr
    const newStatus = select.value;

    // Visual feedback
    select.classList.add('saving');
    select.classList.remove('saved', 'error');

    try {
        const res = await fetch(`/api/admin/orders/${orderId}/status`, {
            method:  'PUT',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ status: newStatus }),
        });

        if (res.ok) {
            // Update local data so filter re-render stays in sync
            const order = allOrders.find(o => String(o._id || o.id) === orderId);
            if (order) order.status = newStatus;

            // Update the status badge in the same row without full re-render
            const row   = select.closest('tr');
            const badge = row.querySelector('.status-badge');
            if (badge) {
                badge.className  = `status-badge ${getStatusClass(newStatus)}`;
                badge.textContent = newStatus;
            }

            select.classList.add('saved');
            showToast(`Order updated → ${newStatus}`, 'success');

            // Re-render after short delay so filter count stays accurate
            setTimeout(() => {
                select.classList.remove('saved');
                renderOrders();
            }, 1200);
        } else {
            const data = await res.json().catch(() => ({}));
            throw new Error(data.error || 'Server error ' + res.status);
        }
    } catch (err) {
        // Revert select to previous value
        const order = allOrders.find(o => String(o._id || o.id) === orderId);
        if (order) select.value = order.status;
        select.classList.add('error');
        showToast('Failed to update: ' + err.message, 'error');
        setTimeout(() => select.classList.remove('error'), 2000);
    } finally {
        select.classList.remove('saving');
    }
}

function getStatusClass(s) {
    return { pending:'status-pending', preparing:'status-preparing', ready:'status-ready', delivered:'status-delivered' }[s] || 'status-pending';
}

// Auto-refresh every 20 seconds
function startAutoRefresh() {
    if (autoTimer) clearInterval(autoTimer);
    autoTimer = setInterval(loadOrders, 20000);
}

checkAdmin().then(() => {
    loadOrders();
    startAutoRefresh();
});
</script>
</body>
</html>
