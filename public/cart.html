<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart — Just Cafe</title>
<link rel="stylesheet" href="/css/style.css">
<style>
    body {
        background: var(--bg);
        background-image:
            radial-gradient(circle at 10% 20%, rgba(212,160,84,0.08) 0%, transparent 50%),
            radial-gradient(circle at 90% 80%, rgba(111,78,55,0.06) 0%, transparent 50%);
        min-height: 100vh;
    }
    .cart-page-bg {
        background: linear-gradient(135deg, #FDF0E4 0%, #FFF8F0 50%, #FCEEDD 100%);
        min-height: calc(100vh - 64px);
        padding-bottom: 3rem;
    }
    .cart-header { background: var(--gradient); padding: 2.5rem 2rem; color: #fff; text-align: center; }
    .cart-item { transition: background 0.2s; }
    .cart-item:hover { background: rgba(212,160,84,0.05); }
    .remove-btn {
        background: none; border: none; color: var(--text-muted);
        font-size: 1.1rem; cursor: pointer; padding: 4px 8px;
        border-radius: 6px; transition: all 0.2s;
    }
    .remove-btn:hover { background: #FFEBEE; color: var(--danger); }
</style>
</head>
<body>

<nav class="navbar">
    <a href="/" class="navbar-brand">☕ <span>Just</span>Cafe</a>
    <ul class="nav-links" id="navUserSection"></ul>
</nav>

<div class="cart-page-bg">
    <div class="cart-header">
        <h1 style="font-size:2rem;font-weight:900;margin-bottom:0.3rem;">🛒 Your Cart</h1>
        <p style="color:rgba(255,255,255,0.8);">Review your items before placing the order</p>
    </div>

    <div class="section" style="padding-top:2rem;">
        <div class="cart-container">
            <div id="cartContent"></div>
        </div>
    </div>
</div>

<!-- ORDER SUCCESS MODAL -->
<div class="modal-overlay" id="successModal">
    <div class="modal-box" style="text-align:center;">
        <div style="font-size:3rem;margin-bottom:1rem;">🎉</div>
        <h2 style="font-size:1.5rem;font-weight:900;color:var(--primary-dark);margin-bottom:0.5rem;">Order Placed!</h2>
        <p style="color:var(--text-light);margin-bottom:0.5rem;">Your order has been received.</p>
        <p id="waitMsg" style="font-size:1.1rem;font-weight:700;color:var(--primary);margin-bottom:1.5rem;"></p>
        <div style="display:flex;gap:1rem;justify-content:center;">
            <a href="/orders" class="btn btn-primary">View My Orders</a>
            <a href="/menu" class="btn btn-outline">Order More</a>
        </div>
    </div>
</div>

<script src="/js/main.js"></script>
<script>
function renderCart() {
    const cart = Cart.get();
    const container = document.getElementById('cartContent');

    if (!cart.length) {
        container.innerHTML = `
            <div class="card empty-state" style="padding:4rem 2rem;">
                <div class="icon">🛒</div>
                <h3>Your cart is empty</h3>
                <p>Add some delicious items from the menu!</p>
                <a href="/menu" class="btn btn-primary" style="margin-top:1.5rem;">Browse Menu</a>
            </div>`;
        return;
    }

    const subtotal = Cart.total();
    const tax      = subtotal * 0.05;
    const total    = subtotal + tax;

    // Build cart HTML — IDs are MongoDB strings, pass them as data-id attributes
    // to avoid any inline-onclick numeric coercion issues
    const itemsHTML = cart.map(item => `
        <div class="cart-item" data-id="${item.id}">
            <img src="${item.image || 'https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=200'}"
                 alt="${item.name}"
                 onerror="this.src='https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=200'">
            <div class="cart-item-info">
                <div class="cart-item-name">${item.name}</div>
                <div class="cart-item-price">${fmt(item.price)} each</div>
            </div>
            <div style="display:flex;align-items:center;gap:0.75rem;">
                <div class="qty-control">
                    <button class="qty-btn" data-action="dec" data-id="${item.id}">−</button>
                    <span class="qty-display">${item.qty}</span>
                    <button class="qty-btn" data-action="inc" data-id="${item.id}">+</button>
                </div>
                <div style="font-weight:700;min-width:60px;text-align:right;">${fmt(item.price * item.qty)}</div>
                <button class="remove-btn" data-action="remove" data-id="${item.id}" title="Remove">✕</button>
            </div>
        </div>
    `).join('');

    container.innerHTML = `
        <div class="card" style="margin-bottom:1.5rem;">
            <div style="padding:1rem 1.2rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;">
                <h3 style="font-weight:800;color:var(--primary-dark);">Items (${cart.length})</h3>
                <button class="btn btn-sm" style="color:var(--danger);border:1px solid var(--danger);background:none;" onclick="clearCartConfirm()">🗑 Clear All</button>
            </div>
            ${itemsHTML}
        </div>

        <div class="cart-summary">
            <h3 style="font-weight:800;color:var(--primary-dark);margin-bottom:1.2rem;">Order Summary</h3>
            <div class="cart-summary-row"><span>Subtotal</span><span>${fmt(subtotal)}</span></div>
            <div class="cart-summary-row"><span>Tax (5%)</span><span>${fmt(tax)}</span></div>
            <div class="cart-summary-row total"><span>Total</span><span>${fmt(total)}</span></div>
            <div style="margin-top:1.2rem;display:flex;gap:1rem;flex-wrap:wrap;">
                <a href="/menu" class="btn btn-outline" style="flex:1;justify-content:center;">← Continue Shopping</a>
                <button class="btn btn-primary" style="flex:2;" onclick="placeOrder()" id="orderBtn">
                    ✅ Place Order — ${fmt(total)}
                </button>
            </div>
        </div>`;

    // Attach click handlers using event delegation — no inline onclick with IDs
    container.addEventListener('click', handleCartClick);
}

function handleCartClick(e) {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const id     = btn.dataset.id;   // always a string
    const action = btn.dataset.action;

    if (action === 'inc') {
        const cart = Cart.get();
        const item = cart.find(c => String(c.id) === String(id));
        if (item) Cart.update(id, item.qty + 1);
        renderCart();
        updateCartBadge();
    } else if (action === 'dec') {
        const cart = Cart.get();
        const item = cart.find(c => String(c.id) === String(id));
        if (item) Cart.update(id, item.qty - 1);
        renderCart();
        updateCartBadge();
    } else if (action === 'remove') {
        Cart.remove(id);
        renderCart();
        updateCartBadge();
        showToast('Item removed from cart', '');
    }
}

function clearCartConfirm() {
    if (confirm('Remove all items from cart?')) {
        Cart.clear();
        renderCart();
        showToast('Cart cleared', '');
    }
}

async function placeOrder() {
    const auth = await getAuthStatus();
    if (!auth.loggedIn) {
        showToast('Please login to place an order', 'error');
        setTimeout(() => window.location.href = '/login', 1200);
        return;
    }

    const cart = Cart.get();
    if (!cart.length) return;

    const btn = document.getElementById('orderBtn');
    btn.textContent = 'Placing order...';
    btn.disabled = true;

    try {
        const res = await fetch('/api/orders', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            // Send menu_item_id as the string MongoDB ObjectId
            body: JSON.stringify({
                items: cart.map(i => ({ menu_item_id: String(i.id), quantity: i.qty }))
            })
        });
        const data = await res.json();

        if (res.ok && data.success) {
            Cart.clear();
            document.getElementById('waitMsg').textContent = `Estimated wait: ${data.waitMinutes} minutes ⏱️`;
            document.getElementById('successModal').classList.add('active');
        } else {
            showToast(data.error || 'Failed to place order', 'error');
            btn.textContent = '✅ Place Order';
            btn.disabled = false;
        }
    } catch (e) {
        showToast('Network error. Please try again.', 'error');
        btn.textContent = '✅ Place Order';
        btn.disabled = false;
    }
}

renderCart();
</script>
</body>
</html>
