<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Campus Café</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">
            <div class="logo-icon">☕</div>
            <h2>Welcome Back!</h2>
            <p>Sign in to your Campus Café account</p>
        </div>

        <div id="alertBox"></div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" class="form-control" placeholder="you@college.edu" autofocus>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" class="form-control" placeholder="Enter your password">
        </div>

        <button class="btn btn-primary btn-full" id="loginBtn" onclick="doLogin()">Sign In</button>

        <p style="text-align:center;margin-top:1.5rem;font-size:0.9rem;color:var(--text-light);">
            Don't have an account? <a href="/register" style="color:var(--primary);font-weight:700;">Register here</a>
        </p>

        <div style="text-align:center;margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border);">
            <p style="font-size:0.78rem;color:var(--text-muted);">Demo admin: admin@cafe.com</p>
        </div>
    </div>
</div>

<script src="/js/main.js"></script>
<script>
// If already logged in, redirect
getAuthStatus().then(auth => {
    if (auth.loggedIn) window.location.href = auth.role === 'admin' ? '/admin/dashboard' : '/menu';
});

// Allow Enter key
document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

async function doLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const alertBox = document.getElementById('alertBox');
    const btn = document.getElementById('loginBtn');

    alertBox.innerHTML = '';
    if (!email || !password) {
        alertBox.innerHTML = '<div class="alert alert-error">Please fill in all fields.</div>';
        return;
    }

    btn.textContent = 'Signing in...';
    btn.disabled = true;

    try {
        const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (res.ok && data.success) {
            showToast('Welcome back, ' + data.name + '! ☕', 'success');
            setTimeout(() => {
                window.location.href = data.role === 'admin' ? '/admin/dashboard' : '/menu';
            }, 600);
        } else {
            alertBox.innerHTML = `<div class="alert alert-error">${data.error || 'Login failed. Please try again.'}</div>`;
            btn.textContent = 'Sign In';
            btn.disabled = false;
        }
    } catch (e) {
        alertBox.innerHTML = '<div class="alert alert-error">Network error. Please try again.</div>';
        btn.textContent = 'Sign In';
        btn.disabled = false;
    }
}
</script>
</body>
</html>
